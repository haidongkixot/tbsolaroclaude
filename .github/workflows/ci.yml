name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'TBSolaro/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: TBSolaro

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TBSolaro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # generate only reads schema.prisma — no real DB needed
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TBSolaro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: ESLint
        run: npm run lint
